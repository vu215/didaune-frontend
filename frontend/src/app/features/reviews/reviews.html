<div *ngIf="place() as place" class="p-4 lg:p-8 pb-24 md:pb-12 max-w-3xl mx-auto">
  <div class="mb-6 rounded-[28px] border border-slate-100 bg-white p-4 shadow-sm">
    <div class="flex items-center gap-4">
      <img [src]="place.image" [alt]="place.name" class="h-20 w-20 rounded-2xl object-cover" />
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Dang danh gia</p>
        <h1 class="mt-1 text-2xl font-black text-slate-900">{{ place.name }}</h1>
        <p class="mt-1 text-sm text-slate-500">{{ place.district_name }}</p>
      </div>
    </div>
  </div>

  <div class="mb-6 rounded-[30px] border border-slate-100 bg-white p-6 text-center shadow-sm">
    <h2 class="text-xl font-black text-slate-900">Trai nghiem cua ban the nao?</h2>
    <p class="mt-2 text-sm text-slate-500">Cham so sao va them vai nhan xet ngan de luu lai cam nhan.</p>
    <div class="mt-6 flex justify-center gap-2 text-4xl">
      <button
        *ngFor="let star of [1, 2, 3, 4, 5]"
        type="button"
        (click)="setRating(star)"
        [class]="star <= rating() ? 'text-orange-400' : 'text-slate-200'"
      >
        <i class="fa-solid fa-star"></i>
      </button>
    </div>
  </div>

  <div class="mb-6 rounded-[30px] border border-slate-100 bg-white p-6 shadow-sm">
    <label class="mb-3 block text-sm font-bold text-slate-800">Chia se chi tiet</label>
    <textarea
      rows="5"
      [ngModel]="comment()"
      (ngModelChange)="comment.set($event)"
      placeholder="Do uong, khong gian, phuc vu, cho ngoi lam viec... co gi hay thi viet o day."
      class="w-full rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700 outline-none"
    ></textarea>
  </div>

  <div class="mb-8 rounded-[30px] border border-slate-100 bg-white p-6 shadow-sm">
    <label class="mb-4 block text-sm font-bold text-slate-800">Chon nhanh diem cong</label>
    <div class="flex flex-wrap gap-2">
      <button
        *ngFor="let tag of quickTags"
        type="button"
        (click)="toggleTag(tag)"
        [class]="selectedTags().includes(tag) ? 'bg-primary text-white border-primary' : 'bg-white text-slate-600 border-slate-200'"
        class="rounded-full border px-4 py-2 text-sm font-medium transition"
      >
        {{ tag }}
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage()" class="mb-4 rounded-2xl bg-rose-50 px-4 py-3 text-sm font-medium text-rose-600">
    {{ errorMessage() }}
  </div>

  <div class="flex gap-3">
    <button
      type="button"
      (click)="submit()"
      class="flex-1 rounded-2xl bg-primary px-5 py-4 text-sm font-bold text-white shadow-lg"
    >
      {{ submitting() ? 'Dang gui...' : 'Gui bai danh gia' }}
    </button>
    <a
      [routerLink]="['/detail', place.slug]"
      class="rounded-2xl border border-slate-200 px-5 py-4 text-sm font-bold text-slate-700"
    >
      Quay lai
    </a>
  </div>
</div>
