<div class="flex items-center justify-between px-4 lg:px-8 h-full gap-4">
  <div class="w-auto md:w-64 shrink-0">
    <a href="/" class="flex items-center gap-2 p-2 w-3/5 sm:w-4/5">
      <img src="logo.svg" alt="logo" width="100%" />
    </a>
  </div>

  <div class="flex-1 max-w-2xl hidden md:flex relative items-center">
    <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-400"></i>
    <input
      type="text"
      [value]="dataService.searchQuery()"
      (input)="onSearchChange($event)"
      (keyup.enter)="onSearchEnter()"
      placeholder="Tìm kiếm địa điểm..."
      class="w-full bg-slate-100 py-3 pl-11 pr-4 rounded-xl outline-none focus:ring-2 focus:ring-primary_light transition text-slate-700"
    />
    <button
      *ngIf="dataService.searchQuery()"
      (click)="clearSearch()"
      class="absolute right-2 bg-white text-slate-600 w-8 h-8 rounded-lg shadow-sm hover:text-primary transition flex items-center justify-center"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="flex items-center gap-3 shrink-0">
    <a
      *ngIf="adminAuth.adminSession()"
      routerLink="/admin"
      class="hidden rounded-xl bg-slate-900 px-3 py-2 text-xs font-bold text-white lg:inline-flex"
    >
      Admin
    </a>

    <button
      type="button"
      (click)="toggleMobileSearch()"
      class="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600"
    >
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <div class="hidden lg:flex items-center gap-2">
      <button
        class="w-10 h-10 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:text-primary hover:border-primary_light hover:bg-orange-50 transition flex items-center justify-center"
        title="Tìm gần tôi"
      >
        <i class="fa-solid fa-location-crosshairs"></i>
      </button>

      <select
        id="citySelectDesktop"
        (change)="onCityChange($event)"
        [value]="dataService.currentCityId()"
        class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5 outline-none cursor-pointer font-medium"
      >
        <option *ngFor="let city of cities()" [value]="city.id">{{ city.name }}</option>
      </select>

      <div class="relative">
        <input
          id="wardSelectDesktop"
          type="text"
          [value]="wardQuery()"
          (input)="onWardInput($event)"
          (focus)="onWardFocus()"
          (blur)="onWardBlur()"
          placeholder="Tìm Phường/Xã"
          class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5 outline-none w-56 font-medium"
        />
        <div
          *ngIf="wardDropdownOpen() && filteredWards().length"
          class="absolute top-full left-0 mt-2 w-full max-h-72 overflow-y-auto rounded-xl border border-slate-200 bg-white shadow-lg z-50"
        >
          <button
            *ngFor="let ward of filteredWards()"
            type="button"
            (mousedown)="selectWard(ward)"
            class="w-full px-3 py-2 text-left text-sm text-slate-700 hover:bg-orange-50 hover:text-primary transition"
          >
            {{ ward.name }}
          </button>
        </div>
      </div>
    </div>

    <button
      type="button"
      (click)="openAuthModal('login')"
      class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden border-2 border-primary_light cursor-pointer"
    >
      <img
        [src]="dataService.currentUser().avatar"
        alt="Avatar"
        class="w-full h-full object-cover"
      />
    </button>
  </div>
</div>

<div
  *ngIf="mobileSearchOpen()"
  class="md:hidden absolute top-full left-0 right-0 bg-white border-t border-slate-100 shadow-lg px-4 pb-4 pt-3"
>
  <div class="relative flex items-center">
    <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-400"></i>
    <input
      type="text"
      [value]="dataService.searchQuery()"
      (input)="onSearchChange($event)"
      (keyup.enter)="onSearchEnter()"
      placeholder="Tìm kiếm địa điểm..."
      class="w-full bg-slate-100 py-3 pl-11 pr-20 rounded-xl outline-none focus:ring-2 focus:ring-primary_light transition text-slate-700"
    />
    <button
      *ngIf="dataService.searchQuery()"
      type="button"
      (click)="clearSearch()"
      class="absolute right-12 bg-white text-slate-600 w-8 h-8 rounded-lg shadow-sm hover:text-primary transition flex items-center justify-center"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>
    <button
      type="button"
      (click)="closeMobileSearch()"
      class="absolute right-2 text-slate-500 w-8 h-8 flex items-center justify-center"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
</div>

<div
  *ngIf="authModalOpen()"
  class="fixed inset-0 z-[80] bg-slate-900/45 backdrop-blur-sm flex items-center justify-center p-4"
>
  <div class="absolute inset-0" (click)="closeAuthModal()"></div>
  <div class="relative w-full max-w-[420px] rounded-[22px] bg-white shadow-[0_24px_80px_rgba(15,23,42,0.22)] overflow-hidden">
    <div class="relative px-5 pt-5 pb-4 bg-[radial-gradient(circle_at_top_right,_rgba(249,115,22,0.14),_transparent_36%),linear-gradient(135deg,#fffaf5_0%,#ffffff_58%)]">
      <button
        type="button"
        (click)="closeAuthModal()"
        class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white text-slate-500 hover:text-slate-900 border border-slate-200"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
      <h2 class="mt-3 text-[22px] font-bold leading-tight text-slate-900">
        {{ authMode() === 'login' ? 'Chào mừng bạn quay lại' : 'Tạo tài khoản mới' }}
      </h2>
      <p class="mt-1 text-[13px] leading-5 text-slate-500">
        {{ authMode() === 'login' ? 'Đăng nhập để lưu địa điểm và đồng bộ hành trình.' : 'Đăng ký để lưu quán yêu thích và viết đánh giá.' }}
      </p>
    </div>

    <div class="px-5 pt-4">
      <div class="grid grid-cols-2 rounded-2xl bg-slate-100 p-1">
        <button
          type="button"
          (click)="setAuthMode('login')"
          [class]="authMode() === 'login' ? 'rounded-xl bg-white px-4 py-2 text-[13px] font-semibold text-slate-900 shadow-sm' : 'rounded-xl px-4 py-2 text-[13px] font-medium text-slate-500'"
        >
          Đăng nhập
        </button>
        <button
          type="button"
          (click)="setAuthMode('register')"
          [class]="authMode() === 'register' ? 'rounded-xl bg-white px-4 py-2 text-[13px] font-semibold text-slate-900 shadow-sm' : 'rounded-xl px-4 py-2 text-[13px] font-medium text-slate-500'"
        >
          Đăng ký
        </button>
      </div>
    </div>

    <div class="px-5 py-5">
      <div *ngIf="authMode() === 'login'" class="space-y-3">
        <button
          type="button"
          class="w-full flex items-center justify-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-[14px] font-medium text-slate-700 hover:border-slate-300 hover:bg-slate-50 transition"
        >
          <i class="fa-brands fa-google text-base text-rose-500"></i>
          Tiếp tục với Google
        </button>
        <button
          type="button"
          class="w-full flex items-center justify-center gap-3 rounded-2xl border border-[#1877F2] bg-[#1877F2] px-4 py-2.5 text-[14px] font-medium text-white hover:bg-[#1669d8] transition"
        >
          <i class="fa-brands fa-facebook-f text-base"></i>
          Tiếp tục với Facebook
        </button>
      </div>

      <div *ngIf="authMode() === 'login'" class="my-4 flex items-center gap-3 text-[11px] uppercase tracking-[0.18em] text-slate-300">
        <span class="h-px flex-1 bg-slate-200"></span>
        <span>Hoặc</span>
        <span class="h-px flex-1 bg-slate-200"></span>
      </div>

      <form class="space-y-3">
        <div *ngIf="authMode() === 'register'" class="space-y-1">
          <label class="text-[13px] font-medium text-slate-700">Họ và tên</label>
          <input
            type="text"
            placeholder="Nhập họ và tên"
            [ngModel]="authName()"
            (ngModelChange)="authName.set($event)"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-[14px] outline-none focus:border-primary focus:bg-white"
          />
        </div>
        <div class="space-y-1">
          <label class="text-[13px] font-medium text-slate-700">Email</label>
          <input
            type="email"
            placeholder="you@example.com"
            [ngModel]="authEmail()"
            (ngModelChange)="authEmail.set($event)"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-[14px] outline-none focus:border-primary focus:bg-white"
          />
        </div>
        <div class="space-y-1">
          <label class="text-[13px] font-medium text-slate-700">Mật khẩu</label>
          <input
            type="password"
            placeholder="Nhập mật khẩu"
            [ngModel]="authPassword()"
            (ngModelChange)="authPassword.set($event)"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-[14px] outline-none focus:border-primary focus:bg-white"
          />
        </div>
        <div *ngIf="authMode() === 'register'" class="space-y-1">
          <label class="text-[13px] font-medium text-slate-700">Xác nhận mật khẩu</label>
          <input
            type="password"
            placeholder="Nhập lại mật khẩu"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-[14px] outline-none focus:border-primary focus:bg-white"
          />
        </div>

        <button
          type="button"
          (click)="submitAuth()"
          class="mt-1 w-full rounded-2xl bg-slate-900 px-4 py-2.5 text-[14px] font-semibold text-white hover:bg-slate-800 transition"
        >
          {{ authMode() === 'login' ? 'Đăng nhập' : 'Tạo tài khoản' }}
        </button>
      </form>

      <p class="mt-4 text-center text-[13px] text-slate-500">
        {{ authMode() === 'login' ? 'Chưa có tài khoản?' : 'Đã có tài khoản?' }}
        <button
          type="button"
          (click)="setAuthMode(authMode() === 'login' ? 'register' : 'login')"
          class="font-semibold text-primary hover:underline"
        >
          {{ authMode() === 'login' ? 'Đăng ký ngay' : 'Đăng nhập' }}
        </button>
      </p>
    </div>
  </div>
</div>
