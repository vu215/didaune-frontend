<section class="mb-8">
  <h1 class="mt-2 text-3xl font-black text-slate-950">Quản lý đối tác và claim requests</h1>
  <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-500">
    Theo dõi owner claims, xác minh chủ quản và đưa listing vào workflow partner chính thức.
  </p>
</section>

<section class="grid gap-5 xl:grid-cols-2">
  <article *ngFor="let row of rows()" class="rounded-[30px] border border-white/70 bg-white p-5 shadow-sm">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="text-xl font-black text-slate-950">{{ row.placeName }}</h2>
        <p class="mt-1 text-sm text-slate-500">{{ row.ownerName }} · {{ row.district }}</p>
      </div>
      <span class="rounded-full px-3 py-1 text-xs font-bold"
        [class]="row.status === 'active' || row.status === 'verified' ? 'bg-emerald-50 text-emerald-600' : row.status === 'pending' ? 'bg-amber-50 text-amber-600' : 'bg-slate-200 text-slate-600'">
        {{ row.status }}
      </span>
    </div>
    <p class="mt-4 text-sm leading-6 text-slate-500">{{ row.source }}</p>
    <div class="mt-5 flex flex-wrap gap-3">
      <button type="button" (click)="setStatus(row.id, 'verified')"
        [disabled]="!adminAuth.hasCapability('partners.manage')"
        class="rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white disabled:cursor-not-allowed disabled:opacity-50">
        Xác minh
      </button>
      <button type="button" (click)="setStatus(row.id, 'pending')"
        [disabled]="!adminAuth.hasCapability('partners.manage')"
        class="rounded-2xl bg-orange-100 px-4 py-3 text-sm font-bold text-orange-700 disabled:cursor-not-allowed disabled:opacity-50">
        Yêu cầu thêm thông tin
      </button>
      <button type="button" (click)="setStatus(row.id, 'rejected')"
        [disabled]="!adminAuth.hasCapability('partners.manage')"
        class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-700 disabled:cursor-not-allowed disabled:opacity-50">
        Từ chối
      </button>
    </div>
  </article>
</section>
