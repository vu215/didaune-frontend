<section class="mb-8">
  <h1 class="mt-2 text-3xl font-black text-slate-950">Quản lý user và phân quyền</h1>
  <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-500">
    Theo dõi vai trò, tình trạng tài khoản, số review và mức độ tham gia của người dùng trong hệ sinh thái.
  </p>
</section>

<section class="overflow-hidden rounded-[30px] border border-white/70 bg-white shadow-sm">
  <div
    class="grid grid-cols-[1.2fr_1fr_0.7fr_0.6fr_0.6fr_0.7fr] gap-4 border-b border-slate-100 px-6 py-4 text-xs font-bold uppercase tracking-[0.18em] text-slate-400">
    <div>User</div>
    <div>Email</div>
    <div>Chức vụ</div>
    <div>Đánh giá</div>
    <div>Yêu thích</div>
    <div>Trạng thái</div>
  </div>

  <div *ngFor="let row of rows()"
    class="grid grid-cols-[1.2fr_1fr_0.7fr_0.6fr_0.6fr_0.7fr] gap-4 border-b border-slate-50 px-6 py-5 text-sm">
    <div class="font-bold text-slate-950">{{ row.name }}</div>
    <div class="text-slate-500">{{ row.email }}</div>
    <div>
      <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-700">{{ row.role }}</span>
    </div>
    <div class="font-semibold text-slate-700">{{ row.reviews }}</div>
    <div class="font-semibold text-slate-700">{{ row.favorites }}</div>
    <div>
      <span class="rounded-full px-3 py-1 text-xs font-bold"
        [class]="row.status === 'active' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'">
        {{ row.status }}
      </span>
    </div>
  </div>
</section>
