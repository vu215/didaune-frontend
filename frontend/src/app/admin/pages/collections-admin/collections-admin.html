<section class="mb-8">
  <h1 class="mt-2 text-3xl font-black text-slate-950">Quản lý bộ sưu tập nổi bật</h1>
  <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-500">
    Giữ homepage và discovery feed luôn có những collection có chủ đề rõ, đúng mood và đúng đối tượng.
  </p>
</section>

<section class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
  <article *ngFor="let row of rows()"
    class="rounded-[32px] border border-white/70 bg-[linear-gradient(145deg,#ffffff_0%,#fff7ed_100%)] p-6 shadow-sm">
    <div class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400">{{ row.theme }}</div>
    <h2 class="mt-3 text-2xl font-black text-slate-950">{{ row.title }}</h2>
    <p class="mt-3 text-sm leading-6 text-slate-500">{{ row.count }} địa điểm trong collection này.</p>
    <div class="mt-5 flex items-center justify-between">
      <span class="rounded-full px-3 py-1 text-xs font-bold"
        [class]="row.status === 'published' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-200 text-slate-600'">
        {{ row.status }}
      </span>
      <div class="flex gap-2">
        <button type="button" (click)="setStatus(row.id, 'published')"
          [disabled]="!adminAuth.hasCapability('collections.manage')"
          class="rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white disabled:cursor-not-allowed disabled:opacity-50">
          Xuất bản
        </button>
        <button type="button" (click)="setStatus(row.id, 'draft')"
          [disabled]="!adminAuth.hasCapability('collections.manage')"
          class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-700 disabled:cursor-not-allowed disabled:opacity-50">
          Bản nháp
        </button>
      </div>
    </div>
  </article>
</section>
