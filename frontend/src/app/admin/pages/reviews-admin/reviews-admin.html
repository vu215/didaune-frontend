<div class="mb-14 lg:flex lg:items-end lg:justify-between gap-6">
  <div class="max-w-2xl">

    <div class="flex items-center gap-4 mt-2">
      <h1 class="text-3xl font-black text-slate-800 tracking-tight">Quản lý Đánh giá</h1>
      <span
        class="bg-orange-500 text-white text-[10px] px-3 py-1 rounded-full font-black shadow-lg shadow-orange-500/20">{{
        filteredRows().length }}</span>
    </div>
    <p class="text-sm text-slate-500 font-medium mt-3">Kiểm duyệt nội dung cộng đồng và tăng cường tương tác AI Insight.
    </p>
  </div>

  <div class="mt-8 lg:mt-0 flex flex-wrap gap-2">
    <button type="button" (click)="filter.set('all')"
      [class]="filter() === 'all' ? 'bg-slate-900 text-white shadow-xl shadow-slate-900/20' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'"
      class="h-10 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Tất cả</button>
    <button type="button" (click)="filter.set('pending')"
      [class]="filter() === 'pending' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'"
      class="h-10 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Đang chờ</button>
    <button type="button" (click)="filter.set('flagged')"
      [class]="filter() === 'flagged' ? 'bg-rose-500 text-white shadow-xl shadow-rose-500/20' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'"
      class="h-10 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Bị báo cáo</button>
  </div>
</div>

<section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
  <article *ngFor="let row of filteredRows()"
    class="bg-white p-8 rounded-[24px] border border-slate-100 hover:border-orange-200 shadow-sm transition-all group cursor-pointer hover:shadow-2xl hover:-translate-y-1 relative">

    <div class="flex items-start justify-between mb-6">
      <div class="flex items-center gap-4">
        <div class="relative">
          <img [src]="row.review.avatar" [alt]="row.review.user_name"
            class="w-12 h-12 rounded-2xl object-cover ring-4 ring-transparent group-hover:ring-orange-500/10 transition-all shadow-md">
          <div
            class="absolute -bottom-1 -right-1 h-5 w-5 rounded-lg bg-orange-500 text-white text-[8px] font-black flex items-center justify-center border-2 border-white">
            {{ row.review.rating }}
          </div>
        </div>
        <div>
          <h4
            class="text-xs font-black text-slate-900 truncate w-32 tracking-tight transition-colors group-hover:text-orange-500">
            {{ row.review.user_name }}</h4>
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">{{ row.placeName }}</p>
        </div>
      </div>
      <div class="flex flex-col items-end gap-1 underline-offset-4 decoration-orange-500 group-hover:underline">
        <span class="text-[9px] font-bold text-slate-400 italic">{{ row.review.created_at | date:'dd/MM' }}</span>
        <span
          [class]="'h-1.5 w-1.5 rounded-full ' + (row.moderationStatus === 'approved' ? 'bg-emerald-500' : 'bg-orange-500')"></span>
      </div>
    </div>

    <!-- Review Comment with specific Font Style from index.html -->
    <div
      class="bg-slate-50 rounded-2xl p-5 border border-transparent group-hover:border-slate-100 group-hover:bg-white transition-all">
      <p class="text-xs text-slate-600 leading-relaxed line-clamp-4 italic">"{{ row.review.comment }}"</p>

      <div *ngIf="row.review.images.length" class="mt-6 flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
        <img *ngFor="let image of row.review.images" [src]="image"
          class="h-16 w-16 rounded-xl object-cover ring-2 ring-white shadow-sm hover:scale-110 transition-transform" />
      </div>
    </div>

    <!-- Action Buttons from Mockup index.html -->
    <div
      class="mt-8 flex gap-3 opacity-0 group-hover:opacity-100 translate-y-4 group-hover:translate-y-0 transition-all duration-300">
      <button (click)="setModerationStatus(row.review.id, 'flagged')"
        class="flex-1 py-3 bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400 rounded-xl hover:bg-rose-50 hover:text-rose-500 transition-all border border-transparent hover:border-rose-100">
        Ẩn
      </button>
      <button (click)="setModerationStatus(row.review.id, 'approved')"
        class="flex-1 py-3 bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-orange-600 transition-all shadow-xl hover:shadow-orange-500/20 shadow-slate-950/10">
        Phê duyệt
      </button>
    </div>
  </article>
</section>
