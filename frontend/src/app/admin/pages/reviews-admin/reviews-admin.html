<section class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
  <div>
    <h1 class="mt-2 text-3xl font-black text-slate-950">Quản lý đánh giá</h1>
    <p class="mt-2 text-sm leading-6 text-slate-500">
      Queue này gom review từ user và dữ liệu external cần moderation, flag hoặc ghim nổi bật.
    </p>
  </div>
  <div class="flex flex-wrap gap-2">
    <button type="button" (click)="filter.set('all')"
      [class]="filter() === 'all' ? 'bg-slate-950 text-white' : 'bg-white text-slate-600 border border-slate-200'"
      class="rounded-full px-4 py-2 text-sm font-bold">Tất cả</button>
    <button type="button" (click)="filter.set('pending')"
      [class]="filter() === 'pending' ? 'bg-amber-500 text-white' : 'bg-white text-slate-600 border border-slate-200'"
      class="rounded-full px-4 py-2 text-sm font-bold">Đang chờ</button>
    <button type="button" (click)="filter.set('flagged')"
      [class]="filter() === 'flagged' ? 'bg-rose-500 text-white' : 'bg-white text-slate-600 border border-slate-200'"
      class="rounded-full px-4 py-2 text-sm font-bold">Đánh dấu</button>
    <button type="button" (click)="filter.set('approved')"
      [class]="filter() === 'approved' ? 'bg-emerald-500 text-white' : 'bg-white text-slate-600 border border-slate-200'"
      class="rounded-full px-4 py-2 text-sm font-bold">Đã duyệt</button>
  </div>
</section>

<section class="space-y-4">
  <article *ngFor="let row of filteredRows()" class="rounded-[30px] border border-white/70 bg-white p-5 shadow-sm">
    <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
      <div class="flex gap-4">
        <img [src]="row.review.avatar" [alt]="row.review.user_name" class="h-14 w-14 rounded-full object-cover" />
        <div>
          <div class="flex flex-wrap items-center gap-2">
            <h2 class="text-lg font-black text-slate-950">{{ row.review.user_name }}</h2>
            <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-600">
              {{ row.placeName }}
            </span>
          </div>
          <p class="mt-1 text-sm text-slate-500">
            {{ row.review.created_at | date:'dd/MM/yyyy HH:mm' }} · {{ row.review.rating }} ★
          </p>
        </div>
      </div>

      <span class="rounded-full px-3 py-1 text-xs font-bold"
        [class]="row.moderationStatus === 'approved' ? 'bg-emerald-50 text-emerald-600' : row.moderationStatus === 'pending' ? 'bg-amber-50 text-amber-600' : 'bg-rose-50 text-rose-600'">
        {{ row.moderationStatus }}
      </span>
    </div>

    <p class="mt-4 text-sm leading-7 text-slate-600">{{ row.review.comment }}</p>

    <div *ngIf="row.review.images.length" class="mt-4 flex gap-3 overflow-x-auto pb-2">
      <img *ngFor="let image of row.review.images" [src]="image" [alt]="row.placeName"
        class="h-24 w-24 rounded-2xl object-cover" />
    </div>

    <div class="mt-5 flex flex-wrap gap-3">
      <button type="button" (click)="setModerationStatus(row.review.id, 'approved')"
        [disabled]="!adminAuth.hasCapability('reviews.manage')"
        class="rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white disabled:cursor-not-allowed disabled:opacity-50">
        Duyệt
      </button>
      <button type="button" (click)="setModerationStatus(row.review.id, 'pending')"
        [disabled]="!adminAuth.hasCapability('reviews.manage')"
        class="rounded-2xl bg-amber-100 px-4 py-3 text-sm font-bold text-amber-700 disabled:cursor-not-allowed disabled:opacity-50">
        Cần xem xét
      </button>
      <button type="button" (click)="setModerationStatus(row.review.id, 'flagged')"
        [disabled]="!adminAuth.hasCapability('reviews.manage')"
        class="rounded-2xl bg-rose-100 px-4 py-3 text-sm font-bold text-rose-700 disabled:cursor-not-allowed disabled:opacity-50">
        Ẩn
      </button>
    </div>
  </article>
</section>
