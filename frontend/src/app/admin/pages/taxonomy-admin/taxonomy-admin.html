<section class="mb-8">
  <h1 class="mt-2 text-3xl font-black text-slate-950">Quản lý category, amenity và collection tags</h1>
  <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-500">
    Đây là tầng cơ bản giữ cho discovery app có hệ thống phân loại rõ ràng và không bị loãng data.
  </p>
</section>

<section class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
  <article *ngFor="let row of rows()" class="rounded-[30px] border border-white/70 bg-white p-5 shadow-sm">
    <div class="flex items-start justify-between gap-4">
      <div>
        <div class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400">{{ row.type }}</div>
        <h2 class="mt-2 text-xl font-black text-slate-950">{{ row.name }}</h2>
      </div>
      <span [class]="row.accent + ' text-sm font-bold'">{{ row.usage }} used</span>
    </div>

    <div class="mt-5 flex flex-wrap gap-3">
      <button type="button" class="rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white">Sửa</button>
      <button type="button" class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-700">
        Lưu trữ
      </button>
    </div>
  </article>
</section>
