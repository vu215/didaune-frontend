<div class="mb-14 lg:flex lg:items-end lg:justify-between gap-6">
  <div class="max-w-2xl">

    <h1 class="text-3xl font-black text-slate-800 tracking-tight mt-2">Báo cáo & Giám sát</h1>
    <p class="text-sm text-slate-500 font-medium mt-3">Theo dõi các chỉ số vận hành và các báo cáo vi phạm nội dung.</p>
  </div>

  <div class="mt-8 lg:mt-0 flex gap-3">
    <button
      class="h-11 px-6 bg-white border border-slate-200 rounded-xl text-xs font-black uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all shadow-sm flex items-center gap-2">
      <i class="fas fa-rotate-right text-[10px]"></i> Refresh
    </button>
    <button
      class="h-11 px-6 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-600 transition-all shadow-xl shadow-slate-950/10 flex items-center gap-2">
      <i class="fas fa-file-export text-orange-500"></i> Export XLS
    </button>
  </div>
</div>

<section class="grid grid-cols-1 md:grid-cols-2 gap-8">
  <article *ngFor="let row of rows()"
    class="group p-8 bg-white border border-slate-100 rounded-[28px] shadow-sm hover:shadow-2xl transition-all duration-500 hover:-translate-y-1 relative overflow-hidden">

    <!-- Decorative element -->
    <div
      class="absolute -right-8 -top-8 w-24 h-24 bg-slate-50 rounded-full group-hover:bg-orange-500/5 transition-colors duration-700">
    </div>

    <div class="relative z-10">
      <div class="flex items-start justify-between mb-8">
        <div class="max-w-[70%]">
          <h2 class="text-xl font-black text-slate-900 tracking-tight group-hover:text-orange-500 transition-colors">{{
            row.title }}</h2>
          <p class="mt-2 text-xs text-slate-400 font-bold leading-relaxed">{{ row.description }}</p>
        </div>
        <div [class]="'px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest border ' + 
          (row.severity === 'high' ? 'bg-rose-50 border-rose-100 text-rose-500' : 
           row.severity === 'medium' ? 'bg-orange-50 border-orange-100 text-orange-500' : 
           'bg-emerald-50 border-emerald-100 text-emerald-500')">
          {{ row.severity }}
        </div>
      </div>

      <div class="mt-12 flex items-baseline gap-4">
        <div class="text-6xl font-black text-slate-900 tracking-tighter">{{ row.count }}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">yêu cầu mới</div>
      </div>

      <div class="mt-12 flex items-center justify-between">
        <div class="flex-1 max-w-[60%]">
          <div class="h-1.5 w-full bg-slate-50 rounded-full overflow-hidden">
            <div
              [class]="'h-full transition-all duration-1000 ' + (row.severity === 'high' ? 'bg-rose-500' : 'bg-slate-900 group-hover:bg-orange-500')"
              [style.width.%]="row.count > 100 ? 100 : row.count"></div>
          </div>
        </div>

        <button
          class="h-11 px-6 bg-slate-100 group-hover:bg-slate-900 group-hover:text-white rounded-xl text-[9px] font-black uppercase tracking-widest text-slate-500 transition-all flex items-center gap-2">
          Xử lý <i class="fas fa-arrow-right text-[8px]"></i>
        </button>
      </div>
    </div>
  </article>
</section>
