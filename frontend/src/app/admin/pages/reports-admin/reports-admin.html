<section class="mb-8">
  <h1 class="mt-2 text-3xl font-black text-slate-950">Báo cáo chất lượng dữ liệu</h1>
  <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-500">
    Tập trung vào các vấn đề dữ liệu có tác động trực tiếp đến discovery experience và khả năng vận hành.
  </p>
</section>

<section class="grid gap-5 md:grid-cols-2">
  <article *ngFor="let row of rows()" class="rounded-[30px] border border-white/70 bg-white p-6 shadow-sm">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="text-2xl font-black text-slate-950">{{ row.title }}</h2>
        <p class="mt-3 text-sm leading-6 text-slate-500">{{ row.description }}</p>
      </div>
      <span class="rounded-full px-3 py-1 text-xs font-bold"
        [class]="row.severity === 'high' ? 'bg-rose-50 text-rose-600' : row.severity === 'medium' ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'">
        {{ row.severity }}
      </span>
    </div>
    <div class="mt-6 text-5xl font-black text-slate-950">{{ row.count }}</div>
    <div class="mt-5 flex gap-3">
      <button type="button" class="rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-white">
        Hàng đợi công việc
      </button>
      <button type="button" class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-700">
        Xuất danh sách
      </button>
    </div>
  </article>
</section>
