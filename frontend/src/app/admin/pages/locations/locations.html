<div class="mb-14">
  <header class="flex flex-col lg:flex-row lg:justify-between lg:items-end gap-6 mb-10">
    <div>

      <h1 class="text-3xl font-black text-slate-800 tracking-tight">Quản lý Địa điểm</h1>
      <p class="text-sm text-slate-500 font-medium mt-2">Toàn bộ listing địa điểm discovery trong hệ thống DiDauNe.</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-4">
      <div class="relative group">
        <i
          class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs transition-colors group-focus-within:text-orange-500"></i>
        <input [ngModel]="query()" (ngModelChange)="query.set($event)" placeholder="Tìm tên quán, quận, mô tả..."
          class="pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-xs font-bold focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 outline-none w-full sm:w-64 transition-all shadow-sm">
      </div>
      <button (click)="addNewLocation()"
        class="bg-slate-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-orange-600 transition-all shadow-lg hover:shadow-orange-500/20 flex items-center justify-center gap-2">
        <i class="fas fa-plus text-[8px]"></i> Thêm địa điểm
      </button>
    </div>
  </header>

  <!-- Filter Pills -->
  <div class="flex gap-2 mb-10 overflow-x-auto pb-4 scrollbar-hide">
    <button (click)="status.set('all')"
      [class]="status() === 'all' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'bg-white text-slate-500 border border-slate-200 hover:border-orange-200'"
      class="px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">Tất cả</button>
    <button (click)="status.set('published')"
      [class]="status() === 'published' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'bg-white text-slate-500 border border-slate-200 hover:border-orange-200'"
      class="px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">Đã xuất
      bản</button>
    <button (click)="status.set('needs_review')"
      [class]="status() === 'needs_review' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'bg-white text-slate-500 border border-slate-200 hover:border-orange-200'"
      class="px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">Chờ
      duyệt</button>
    <button (click)="status.set('draft')"
      [class]="status() === 'draft' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'bg-white text-slate-500 border border-slate-200 hover:border-orange-200'"
      class="px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">Bản
      nháp</button>
  </div>

  <!-- Locations Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
    <article *ngFor="let row of filteredRows()"
      class="bg-white rounded-2xl border border-slate-100 overflow-hidden group hover:shadow-2xl transition-all duration-500 hover:-translate-y-1 relative">
      <div class="relative h-44 overflow-hidden">
        <img [src]="row.place.image" [alt]="row.place.name"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">

        <!-- Status Badge -->
        <span
          [class]="'absolute top-4 left-4 text-white text-[9px] font-black px-3 py-1.5 rounded-lg uppercase tracking-widest backdrop-blur-md shadow-lg ' + 
          (row.status === 'published' ? 'bg-emerald-500/80 shadow-emerald-500/10' : row.status === 'needs_review' ? 'bg-orange-500/80 shadow-orange-500/10' : 'bg-slate-500/80 shadow-slate-500/10')">
          {{ row.status }}
        </span>

        <!-- Actions Button -->
        <div class="absolute top-4 right-4 group/menu">
          <button
            class="w-9 h-9 bg-white/20 backdrop-blur-md text-white rounded-xl opacity-0 group-hover:opacity-100 transition-all border border-white/20 hover:bg-orange-500/80">
            <i class="fas fa-ellipsis-v text-xs"></i>
          </button>
          <div
            class="absolute top-full right-0 mt-2 w-48 bg-white rounded-xl shadow-2xl border border-slate-100 py-3 opacity-0 invisible group-hover/menu:opacity-100 group-hover/menu:visible transition-all z-20">
            <button (click)="setStatus(row.place.slug, 'published')"
              [disabled]="!adminAuth.hasCapability('locations.manage')"
              class="w-full px-5 py-2.5 text-left text-[10px] font-black text-slate-700 hover:bg-slate-50 hover:text-orange-500 transition-colors uppercase tracking-widest">Xuất
              bản</button>
            <button (click)="setStatus(row.place.slug, 'needs_review')"
              [disabled]="!adminAuth.hasCapability('locations.manage')"
              class="w-full px-5 py-2.5 text-left text-[10px] font-black text-slate-700 hover:bg-slate-50 hover:text-orange-500 transition-colors uppercase tracking-widest">Đưa
              vào hàng đợi</button>
            <button (click)="setStatus(row.place.slug, 'draft')"
              [disabled]="!adminAuth.hasCapability('locations.manage')"
              class="w-full px-5 py-2.5 text-left text-[10px] font-black text-slate-700 hover:bg-slate-50 hover:text-orange-500 transition-colors uppercase tracking-widest">Chuyển
              sang nháp</button>
            <div class="h-px bg-slate-50 my-1"></div>
            <button (click)="deleteLocation(row.place.slug)"
              [disabled]="!adminAuth.hasCapability('locations.manage')"
              class="w-full px-5 py-2.5 text-left text-[10px] font-black text-rose-500 hover:bg-rose-50 transition-colors uppercase tracking-widest">Xóa
              listing</button>
          </div>
        </div>
      </div>

      <div class="p-6">
        <div class="flex justify-between items-start mb-2">
          <h3
            class="font-black text-slate-900 text-sm tracking-tight leading-tight group-hover:text-orange-500 transition-colors line-clamp-1">
            {{ row.place.name }}</h3>
          <span class="text-orange-500 font-black text-[10px] flex items-center gap-1">
            <i class="fas fa-star text-[8px]"></i>{{ row.place.review_count }}
          </span>
        </div>
        <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wide mb-6 flex items-center gap-2">
          <i class="fas fa-map-marker-alt text-[10px]"></i> {{ row.place.area_name }}, {{ row.place.district_name }}
        </p>



        <div class="flex justify-between items-center border-t border-slate-50 pt-6">
          <div class="flex gap-1.5">
            <span *ngFor="let label of row.place.category_labels.slice(0, 1)"
              class="text-[8px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">#{{
              label }}</span>
          </div>
          <a [routerLink]="['/admin/locations', row.place.slug]"
            class="text-[10px] font-black text-slate-900 hover:text-orange-500 uppercase tracking-widest transition-colors flex items-center gap-2">
            Chỉnh sửa <i class="fas fa-arrow-right text-[8px]"></i>
          </a>
        </div>
      </div>
    </article>
  </div>
</div>
