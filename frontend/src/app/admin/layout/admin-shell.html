<div class="min-h-screen bg-slate-50 text-slate-900 flex">

  <!-- Sidebar -->
  <aside class="w-20 lg:w-64 fixed inset-y-0 left-0 z-40 lg:relative">
    <app-admin-shell-nav class="h-full" />
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-h-screen overflow-x-hidden">
    <header class="flex flex-col lg:flex-row lg:justify-end lg:items-center px-6 lg:px-10 py-8 gap-6">

      <div class="flex items-center gap-3">
        <button
          class="p-2 px-4 bg-white border border-slate-200 rounded-xl text-sm font-medium hover:bg-slate-50 transition shadow-sm flex items-center gap-2">
          <i class="fas fa-download text-slate-400"></i> Xuất báo cáo
        </button>
        <button [routerLink]="['/admin/imports']"
          class="p-2 px-4 bg-orange-500 text-white rounded-xl text-sm font-medium hover:bg-orange-600 transition-all flex items-center gap-2">
          <i class="fas fa-plus text-[10px]"></i> Thêm địa điểm
        </button>

        <div class="h-10 w-px bg-slate-200 mx-2"></div>

        <div class="relative group cursor-pointer">
          <img [src]="adminAuth.adminSession()?.avatar" [alt]="adminAuth.adminSession()?.name || 'Admin'"
            class="h-10 w-10 rounded-xl object-cover ring-2 ring-transparent group-hover:ring-orange-500/20 transition-all shadow-sm" />
          <div class="absolute -bottom-1 -right-1 h-3 w-3 rounded-full bg-emerald-500 border-2 border-white shadow-sm">
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 p-6 lg:p-10 pt-0">
      <div class="max-w-[1600px] mx-auto">
        <router-outlet />
      </div>
    </main>

    <footer
      class="p-6 lg:px-10 lg:py-8 border-t border-slate-200/60 text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] flex justify-between items-center opacity-70">
      <div>&copy; 2024 DiDauNe Control Center. Powered by AI Insights.</div>
      <div class="hidden md:flex gap-8">
        <a href="#" class="hover:text-orange-500 transition-colors">Documentation</a>
        <a href="#" class="hover:text-orange-500 transition-colors">Support</a>
      </div>
    </footer>
  </div>
</div>
