<div class="min-h-screen bg-[linear-gradient(180deg,#fff7ed_0%,#f8fafc_24%,#eef2ff_100%)] text-slate-900">
  <div class="grid min-h-screen lg:grid-cols-[290px_1fr]">
    <aside class="hidden bg-slate-950 lg:block">
      <app-admin-shell-nav />
    </aside>

    <div class="flex min-h-screen flex-col">
      <header class="sticky top-0 z-30 border-b border-white/70 bg-white/80 px-4 py-4 backdrop-blur md:px-8">
        <div class="flex items-center justify-between gap-4">
          <div class="ml-auto flex items-center gap-3">
            <div class="hidden items-center gap-3 rounded-2xl border border-slate-200 bg-white px-3 py-2 md:flex">
              <img [src]="adminAuth.adminSession()?.avatar" [alt]="adminAuth.adminSession()?.name || 'Admin'"
                class="h-10 w-10 rounded-full object-cover" />
              <div>
                <div class="text-sm font-bold text-slate-950">{{ adminAuth.adminSession()?.name }}</div>
                <div class="text-xs uppercase tracking-[0.18em] text-slate-400">
                  {{ adminAuth.adminSession()?.role }}
                </div>
              </div>
            </div>
            <a routerLink="/" class="rounded-2xl bg-slate-950 px-4 py-2 text-sm font-bold text-white">
              Mở app người dùng
            </a>
            <a routerLink="/admin/login" (click)="logout()"
              class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700">
              Đăng xuất
            </a>
          </div>
        </div>
      </header>

      <main class="flex-1 px-4 py-6 md:px-8">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
