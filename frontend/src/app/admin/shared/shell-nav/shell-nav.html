<div class="h-full bg-slate-900 text-slate-400 flex flex-col transition-all duration-300 border-r border-slate-800">
  <!-- Logo Section -->
  <a routerLink="/admin" class="p-6 flex items-center gap-3 hover:opacity-80 transition-opacity">
    <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center text-white shadow-lg shadow-orange-500/20">
      <i class="fas fa-bolt"></i>
    </div>
    <span class="text-white font-semibold text-xl hidden lg:block tracking-tight">DiDauNe <span class="text-orange-500">.</span></span>
  </a>

  <!-- Navigation Menu -->
  <nav class="flex-1 px-4 mt-8 space-y-2 overflow-y-auto scrollbar-hide">
    <div *ngFor="let section of sections">
      <!-- Section titles are hidden in the new mockup's flat list, but let's keep them accessible via screen readers or small headers if needed. Mockup is flat. -->
      <a *ngFor="let item of section.items" 
        [hidden]="!adminAuth.hasCapability(item.capability)"
        [routerLink]="item.link" 
        routerLinkActive="bg-orange-500/10 text-orange-500"
        [routerLinkActiveOptions]="{ exact: item.link === '/admin' }"
        class="flex items-center gap-4 p-3 hover:bg-slate-800 hover:text-white rounded-xl transition group">
        <i [class]="'fas ' + item.icon + ' w-6 text-center text-lg transition-transform group-hover:scale-110'"></i>
        <span class="hidden lg:block font-medium text-sm">{{ item.label }}</span>
      </a>
    </div>
  </nav>

  <!-- Bottom Workspace / Account -->
  <div class="p-4 border-t border-slate-800">
    <div class="flex items-center gap-3 lg:bg-slate-800/50 p-2 rounded-xl border border-transparent lg:hover:border-slate-700 transition-all cursor-pointer group">
      <img [src]="adminAuth.adminSession()?.avatar" [alt]="adminAuth.adminSession()?.name || 'Admin'"
        class="w-8 h-8 rounded-lg object-cover ring-2 ring-transparent group-hover:ring-orange-500/20" />
      <div class="hidden lg:block">
        <p class="text-xs font-semibold text-white truncate w-32">{{ adminAuth.adminSession()?.name }}</p>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">{{ adminAuth.adminSession()?.role }}</p>
      </div>
    </div>
    
    <button (click)="logout()" class="mt-4 w-full flex items-center justify-center p-3 text-slate-500 hover:text-rose-500 hover:bg-rose-500/5 rounded-xl transition-all" title="Đăng xuất">
      <i class="fas fa-power-off text-sm"></i>
    </button>
  </div>
</div>
