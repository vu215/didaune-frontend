<div class="flex h-full flex-col">
  <div class="border-b border-white/10 px-5 py-5">
    <div class="mt-5 rounded-[24px] bg-white/10 p-4 backdrop-blur">
      <div class="flex items-center gap-3">
        <img [src]="adminAuth.adminSession()?.avatar" [alt]="adminAuth.adminSession()?.name || 'Admin'"
          class="h-11 w-11 rounded-full object-cover" />
        <div>
          <div class="text-sm font-bold text-white">{{ adminAuth.adminSession()?.name }}</div>
          <div class="text-[11px] uppercase tracking-[0.18em] text-slate-300">
            {{ adminAuth.adminSession()?.role }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-4 py-4">
    <div *ngFor="let section of sections" class="mb-6">
      <div class="mb-3 px-3 text-[11px] font-bold uppercase tracking-[0.22em] text-slate-500">
        {{ section.title }}
      </div>

      <nav class="space-y-1">
        <a *ngFor="let item of section.items" [hidden]="!adminAuth.hasCapability(item.capability)"
          [routerLink]="item.link" routerLinkActive="bg-white text-slate-950 shadow-sm"
          [routerLinkActiveOptions]="{ exact: item.link === '/admin' }"
          class="flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-semibold text-slate-300 transition hover:bg-white/10 hover:text-white">
          <i [class]="'fa-solid ' + item.icon + ' w-5 text-center'"></i>
          <span>{{ item.label }}</span>
        </a>
      </nav>
    </div>
  </div>

  <div class="border-t border-white/10 p-4">
    <a routerLink="/"
      class="flex items-center justify-center gap-2 rounded-2xl bg-white/10 px-4 py-3 text-sm font-bold text-white transition hover:bg-white/20">
      <i class="fa-solid fa-arrow-left"></i>
      Quay về app user
    </a>
  </div>
</div>
