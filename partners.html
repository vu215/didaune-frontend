<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>
    <main class="flex-1 p-6 lg:p-10 bg-slate-50">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Quản lý Đối tác</h1>
                <p class="text-sm text-slate-500">Danh sách các quán cafe, địa điểm hẹn hò trên hệ thống.</p>
            </div>
            <div class="flex gap-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" placeholder="Tìm tên quán..."
                        class="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-orange-500 outline-none w-64">
                </div>
                <button
                    class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 transition">+
                    Thêm mới</button>
            </div>
        </header>

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button class="px-4 py-1.5 bg-orange-500 text-white rounded-full text-[11px] font-bold shadow-sm">Tất
                cả</button>
            <button
                class="px-4 py-1.5 bg-white text-slate-500 border border-slate-200 rounded-full text-[11px] font-medium hover:border-orange-200 transition">Đang
                chờ duyệt (5)</button>
            <button
                class="px-4 py-1.5 bg-white text-slate-500 border border-slate-200 rounded-full text-[11px] font-medium hover:border-orange-200 transition">Cafe</button>
            <button
                class="px-4 py-1.5 bg-white text-slate-500 border border-slate-200 rounded-full text-[11px] font-medium hover:border-orange-200 transition">Hẹn
                hò</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div
                class="bg-white rounded-2xl border border-slate-100 overflow-hidden group hover:shadow-xl transition-all duration-300">
                <div class="relative h-40">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=500"
                        class="w-full h-full object-cover">
                    <span
                        class="absolute top-3 left-3 bg-emerald-500 text-white text-[9px] font-bold px-2 py-1 rounded-md uppercase">Active</span>
                    <button
                        class="absolute top-3 right-3 w-8 h-8 bg-white/20 backdrop-blur-md text-white rounded-full opacity-0 group-hover:opacity-100 transition"><i
                            class="fas fa-ellipsis-v text-xs"></i></button>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-bold text-slate-800 text-sm">Acoustic Soul Coffee</h3>
                        <span class="text-orange-500 font-bold text-xs"><i class="fas fa-star mr-1"></i>4.8</span>
                    </div>
                    <p class="text-[11px] text-slate-400 mb-4 flex items-center gap-1"><i
                            class="fas fa-map-marker-alt"></i> Quận 3, TP.HCM</p>
                    <div class="flex justify-between items-center border-t border-slate-50 pt-3">
                        <div class="flex -space-x-2">
                            <img src="https://ui-avatars.com/api/?name=U1"
                                class="w-5 h-5 rounded-full border border-white">
                            <img src="https://ui-avatars.com/api/?name=U2"
                                class="w-5 h-5 rounded-full border border-white">
                            <span class="text-[9px] text-slate-400 self-center ml-4">+120 reviews</span>
                        </div>
                        <button class="text-[10px] font-bold text-slate-900 hover:text-orange-500">Chi tiết →</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
